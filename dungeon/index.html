<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude SEO Dungeon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #06060e;
      color: #c0c0d0;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Game Area (left) ─────────────────────── */
    #game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      position: relative;
      background: #0a0a1a;
    }

    #game-container {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Activity Log (right sidebar) ─────────── */
    #log-panel {
      width: 340px;
      min-width: 280px;
      max-width: 400px;
      background: #0c0c16;
      border-left: 1px solid #1e1e3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #log-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #1e1e3a;
      flex-shrink: 0;
    }

    #log-header h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #606080;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    #log-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: #2a2a4a #0c0c16;
    }

    #log-content::-webkit-scrollbar {
      width: 4px;
    }
    #log-content::-webkit-scrollbar-track {
      background: #0c0c16;
    }
    #log-content::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 2px;
    }

    .log-line {
      padding: 2px 0;
      word-break: break-word;
    }
    .log-line.tool { color: #5cb8c8; }
    .log-line.text { color: #a0b0a0; }
    .log-line.error { color: #e05050; }
    .log-line.status { color: #d0b040; }
    .log-line.system { color: #505068; }
    .log-line.complete { color: #50c050; }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 900px) {
      #log-panel { width: 240px; min-width: 200px; }
    }
  </style>
</head>
<body>

  <div id="game-area">
    <div id="game-container"></div>
  </div>

  <div id="log-panel">
    <div id="log-header">
      <h2>Activity Log</h2>
    </div>
    <div id="log-content">
      <div class="log-line system">System ready</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
