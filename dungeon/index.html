<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude SEO Dungeon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08081a;
      color: #c0c0d0;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Left: Game / Title Area ──────────────── */
    #game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      position: relative;
      background: #0a0a1a;
    }

    #game-container {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: none;
    }

    /* ── Title Screen (pure HTML) ─────────────── */
    #title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px 20px;
      gap: 0;
    }

    #title-screen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(24px, 4vw, 40px);
      color: #d4af37;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
    }

    #title-screen .subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.8vw, 16px);
      color: #c04040;
      letter-spacing: 6px;
      margin-bottom: 32px;
    }

    /* ── Character Select Row ──────────────── */
    #char-select {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 12px;
    }

    .char-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 260px;
      padding: 14px 0 10px;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.25s;
    }

    .char-option:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .char-option.selected {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.06);
    }

    .char-option canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.8);
      transform-origin: center center;
    }

    .char-option span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #606078;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
      transition: color 0.2s;
    }

    .char-option.selected span {
      color: #d4af37;
    }

    #title-screen .tagline {
      font-size: 15px;
      color: #a0a0b8;
      font-weight: 400;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 400px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #9090a8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: #d4af37;
      background: #10102a;
      border: 1px solid #252540;
      border-radius: 6px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
    }

    .form-group input.path-input {
      font-size: 13px;
      color: #5cb8c8;
    }

    .form-group input.path-input:focus {
      border-color: #5cb8c8;
      box-shadow: 0 0 0 2px rgba(92, 184, 200, 0.1);
    }

    #descend-btn {
      margin-top: 12px;
      padding: 14px 44px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #08081a;
      background: linear-gradient(180deg, #e0c050, #c49a30);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(212, 175, 55, 0.2);
    }

    #descend-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }

    #descend-btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 6px rgba(212, 175, 55, 0.15);
    }

    .safety-note {
      margin-top: 28px;
      font-size: 13px;
      color: #707088;
      text-align: center;
      line-height: 1.7;
    }

    #bridge-status {
      margin-top: 16px;
      font-size: 13px;
      color: #8080a0;
      transition: color 0.3s;
    }

    #bridge-status.connected { color: #60c060; }
    #bridge-status.error { color: #d06060; }

    /* ── Right: Activity Log ─────────────────── */
    #log-panel {
      width: 33.33%;
      min-width: 300px;
      max-width: 600px;
      background: #0c0c16;
      border-left: 1px solid #1a1a30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #log-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #1a1a30;
      flex-shrink: 0;
    }

    #log-header h2 {
      font-size: 12px;
      font-weight: 600;
      color: #8888a0;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
    }

    #log-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      font-size: 13px;
      line-height: 1.8;
      scrollbar-width: thin;
      scrollbar-color: #1e1e38 #0c0c16;
    }

    #log-content::-webkit-scrollbar { width: 4px; }
    #log-content::-webkit-scrollbar-track { background: #0c0c16; }
    #log-content::-webkit-scrollbar-thumb { background: #1e1e38; border-radius: 2px; }

    .log-line {
      padding: 3px 0;
      overflow-wrap: break-word;
      word-wrap: break-word;
      hyphens: auto;
    }
    .log-line.tool { color: #7dd8e8; }
    .log-line.text { color: #c8d0c8; }
    .log-line.error { color: #f06060; }
    .log-line.status { color: #e8c848; }
    .log-line.system { color: #808898; }
    .log-line.complete { color: #60d060; }

    @media (max-width: 900px) {
      #log-panel { width: 30%; min-width: 220px; }
    }
  </style>
</head>
<body>

  <div id="game-area">
    <!-- Title screen (HTML) — hidden when game starts -->
    <div id="title-screen">
      <h1>CLAUDE SEO</h1>
      <div class="subtitle">D U N G E O N</div>

      <div id="char-select">
        <div class="char-option selected" data-char="warrior">
          <canvas id="char-warrior"></canvas>
          <span>WARRIOR</span>
        </div>
        <div class="char-option" data-char="samurai">
          <canvas id="char-samurai"></canvas>
          <span>SAMURAI</span>
        </div>
        <div class="char-option" data-char="knight">
          <canvas id="char-knight"></canvas>
          <span>KNIGHT</span>
        </div>
      </div>

      <div class="tagline">Slay your SEO demons, one by one.</div>

      <div class="form-group">
        <label>Domain</label>
        <input type="text" id="domain-input" value="claude-github.com" placeholder="example.com" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-group">
        <label>Project Folder</label>
        <input type="text" id="path-input" class="path-input" value="E:\claude-github-website" placeholder="C:\path\to\project" autocomplete="off" spellcheck="false">
      </div>

      <button id="descend-btn">SEAL YOUR FATE</button>

      <div class="safety-note">
        Fixes are applied on a new git branch.<br>
        Your main branch is never touched.
      </div>

      <div id="bridge-status">Entering the dungeon...</div>
    </div>

    <!-- Phaser game canvas (hidden until game starts) -->
    <div id="game-container"></div>
  </div>

  <div id="log-panel">
    <div id="log-header">
      <h2>Guild Ledger</h2>
    </div>
    <div id="log-content">
      <div class="log-line system">System ready</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
